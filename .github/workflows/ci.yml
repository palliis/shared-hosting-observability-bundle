name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: PHP ${{ matrix.php }} / Symfony ${{ matrix.symfony }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.3'
            symfony: '6.4.*'
          - php: '8.3'
            symfony: '7.4.*'
          - php: '8.4'
            symfony: '6.4.*'
          - php: '8.4'
            symfony: '7.4.*'
          - php: '8.4'
            symfony: '8.*'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Validate Composer metadata
        run: composer validate --strict

      - name: Install dependencies
        run: >-
          composer update
          --with symfony/cache:${{ matrix.symfony }}
          --with symfony/config:${{ matrix.symfony }}
          --with symfony/console:${{ matrix.symfony }}
          --with symfony/dependency-injection:${{ matrix.symfony }}
          --with symfony/event-dispatcher:${{ matrix.symfony }}
          --with symfony/framework-bundle:${{ matrix.symfony }}
          --with symfony/http-client:${{ matrix.symfony }}
          --with symfony/http-foundation:${{ matrix.symfony }}
          --with symfony/http-kernel:${{ matrix.symfony }}
          --no-interaction
          --no-progress
          --prefer-dist

      - name: Check coding style
        run: composer cs:check

      - name: Run static analysis
        run: composer analyse

      - name: Run tests
        run: composer test
